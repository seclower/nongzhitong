<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农智通 - 商户后台登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #00c68e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --bg-card: rgba(25, 40, 32, 0.95);
            --bg-body: linear-gradient(135deg, rgba(20, 30, 40, 0.92) 0%, rgba(35, 45, 55, 0.9) 50%, rgba(25, 35, 45, 0.92) 100%);
            --border-color: rgba(255, 255, 255, 0.06);
        }
        [data-theme="day"] {
            --primary: #00c68e;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-body: linear-gradient(135deg, #f5f7fa 0%, #f0f2f5 50%, #e8ecef 100%);
            --border-color: rgba(0, 198, 142, 0.15);
        }
        body {
            font-family: 'Roboto', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-body);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 30, 20, 0.85) 0%, rgba(10, 40, 30, 0.8) 50%, rgba(0, 30, 20, 0.85) 100%);
            z-index: 0;
            pointer-events: none;
        }
        [data-theme="day"] .bg-overlay {
            background: linear-gradient(135deg, rgba(0, 198, 142, 0.05) 0%, rgba(0, 198, 142, 0.03) 50%, rgba(0, 198, 142, 0.05) 100%);
        }
        .metallic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 20%, rgba(0, 200, 100, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(100, 180, 255, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        [data-theme="day"] .metallic-overlay {
            background:
                linear-gradient(135deg, rgba(0, 198, 142, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 20%, rgba(0, 198, 142, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(52, 152, 219, 0.03) 0%, transparent 50%);
        }
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }
        [data-theme="day"] .grid-pattern {
            background-image:
                linear-gradient(rgba(0, 198, 142, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 198, 142, 0.04) 1px, transparent 1px);
        }
        .login-container {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 50px;
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        [data-theme="day"] .login-container {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), rgba(0, 255, 136, 0.3), transparent);
        }
        .login-container::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08), transparent 60%);
            pointer-events: none;
        }
        [data-theme="day"] .login-container::after {
            background: radial-gradient(circle, rgba(0, 198, 142, 0.05), transparent 60%);
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #00994d 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 14px;
            background: linear-gradient(135deg, rgba(15, 30, 22, 0.9) 0%, rgba(10, 25, 18, 0.95) 100%);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        [data-theme="day"] .form-group input {
            border: 1px solid rgba(0, 198, 142, 0.2);
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecef 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 0 20px rgba(0, 255, 136, 0.15);
        }
        [data-theme="day"] .form-group input:focus {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08), 0 0 20px rgba(0, 198, 142, 0.1);
        }
        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 255, 136, 0.15));
            color: #ffffff;
            border: 2px solid rgba(0, 255, 136, 0.5);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        [data-theme="day"] .login-btn {
            background: linear-gradient(135deg, rgba(0, 198, 142, 0.15), rgba(0, 198, 142, 0.08));
            color: var(--text-primary);
            border-color: rgba(0, 198, 142, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }
        [data-theme="day"] .login-btn::before {
            background: linear-gradient(90deg, transparent, rgba(0, 198, 142, 0.1), transparent);
        }
        .login-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.4), rgba(0, 255, 136, 0.25));
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }
        [data-theme="day"] .login-btn:hover {
            background: linear-gradient(135deg, rgba(0, 198, 142, 0.2), rgba(0, 198, 142, 0.12));
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        .login-btn:hover::before {
            left: 100%;
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .forgot-link {
            text-align: right;
            margin-top: 15px;
        }
        .forgot-link a {
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .forgot-link a:hover {
            color: var(--primary);
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .theme-toggle:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--primary);
        }
        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
                margin: 20px;
            }
            .login-header h1 {
                font-size: 28px;
            }
            .theme-toggle {
                width: 40px;
                height: 40px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="metallic-overlay"></div>
    <div class="grid-pattern"></div>
    
    <button id="theme-toggle" class="theme-toggle" title="切换主题">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="login-container">
        <div class="login-header">
            <h1>农智通</h1>
            <p>商户后台管理系统</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button type="submit" class="login-btn">登录</button>
            <div class="forgot-link">
                <a href="#">忘记密码?</a>
            </div>
        </form>
    </div>

    <script src="js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                if (username === 'admin' && password === 'admin123') {
                    window.location.href = 'dashboard.html';
                } else {
                    alert('用户名或密码错误');
                }
            });
        });
    </script>
</body>
</html>

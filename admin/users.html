<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农智通 - 用户管理</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 400px;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            width: 20px;
            height: 20px;
            fill: rgba(51, 51, 51, 0.5);
        }
        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 255, 245, 0.85) 100%);
            border: 2rpx solid rgba(0, 180, 100, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4rpx 20rpx rgba(0, 0, 0, 0.1);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20rpx rgba(0, 180, 100, 0.2);
        }
        .filter-box {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .filter-select {
            padding: 12px 16px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 255, 245, 0.85) 100%);
            border: 2rpx solid rgba(0, 180, 100, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4rpx 20rpx rgba(0, 0, 0, 0.1);
        }
        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20rpx rgba(0, 180, 100, 0.2);
        }
        .filter-select option {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .table-container {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.96) 0%, rgba(245, 255, 245, 0.94) 100%);
            border-radius: 20px;
            box-shadow: 0 10rpx 40rpx rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            padding: 30px;
            border: 2rpx solid rgba(0, 180, 100, 0.3);
            position: relative;
            overflow: hidden;
        }
        .table-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 100, 0.5), rgba(0, 160, 100, 0.3), transparent);
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), rgba(0, 180, 100, 0.5));
            border-radius: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 180, 100, 0.2);
        }
        th {
            background: linear-gradient(135deg, rgba(0, 180, 100, 0.12), rgba(0, 180, 100, 0.05));
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            position: relative;
        }
        th::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 100, 0.3), transparent);
        }
        td {
            font-size: 14px;
            color: var(--text-primary);
        }
        tr:hover td {
            background: rgba(0, 180, 100, 0.05);
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }
        .status-badge.active {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            border: 1px solid rgba(76, 175, 80, 0.4);
        }
        .status-badge.inactive {
            background: rgba(244, 67, 54, 0.2);
            color: var(--danger);
            border: 1px solid rgba(244, 67, 54, 0.4);
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .action-btn.view {
            background: linear-gradient(135deg, rgba(0, 180, 100, 0.25), rgba(0, 150, 100, 0.15));
            color: var(--primary);
            border-color: rgba(0, 180, 100, 0.4);
        }
        .action-btn.view:hover {
            background: linear-gradient(135deg, rgba(0, 180, 100, 0.35), rgba(0, 150, 100, 0.25));
            box-shadow: 0 4rpx 15rpx rgba(0, 180, 100, 0.3);
        }
        .action-btn.edit {
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.25), rgba(25, 118, 210, 0.15));
            color: var(--info);
            border-color: rgba(33, 150, 243, 0.4);
        }
        .action-btn.edit:hover {
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.35), rgba(25, 118, 210, 0.25));
            box-shadow: 0 4rpx 15rpx rgba(33, 150, 243, 0.3);
        }
        .action-btn.block {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.25), rgba(211, 47, 47, 0.15));
            color: var(--danger);
            border-color: rgba(244, 67, 54, 0.4);
        }
        .action-btn.block:hover {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.35), rgba(211, 47, 47, 0.25));
            box-shadow: 0 4rpx 15rpx rgba(244, 67, 54, 0.3);
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }
        .pagination-btn {
            padding: 10px 16px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 255, 245, 0.85) 100%);
            border: 2rpx solid rgba(0, 180, 100, 0.3);
            border-radius: 8px;
            color: #333333;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4rpx 20rpx rgba(0, 0, 0, 0.1);
        }
        .pagination-btn:hover {
            background: linear-gradient(145deg, rgba(245, 255, 245, 0.9) 0%, rgba(235, 255, 245, 0.85) 100%);
            border-color: #00cc66;
            color: #333333;
            box-shadow: 0 0 20rpx rgba(0, 180, 100, 0.2);
        }
        .pagination-btn.active {
            background: linear-gradient(135deg, rgba(0, 180, 100, 0.25), rgba(0, 150, 100, 0.15));
            border-color: rgba(0, 180, 100, 0.4);
            color: #00cc66;
            box-shadow: 0 0 20rpx rgba(0, 180, 100, 0.25);
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-ellipsis {
            padding: 10px 16px;
            color: rgba(51, 51, 51, 0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="metallic-overlay"></div>
    <div class="grid-pattern"></div>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>农智通</h1>
                <div class="sidebar-subtitle">AGRI INTELLIGENCE</div>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">仪表盘</a></li>
                <li><a href="products.html">产品管理</a></li>
                <li><a href="orders.html">订单管理</a></li>
                <li><a href="users.html" class="active">用户管理</a></li>
                <li><a href="statistics.html">数据统计</a></li>
                <li><a href="settings.html">系统设置</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <div class="header-left">
                    <div class="header-icon">
                        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    </div>
                    <h2>用户管理</h2>
                </div>
                <div class="user-info">
                    <div class="user-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    </div>
                    <span>管理员</span>
                    <button class="logout-btn">退出登录</button>
                </div>
            </div>
            <div class="action-bar">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" class="search-input" placeholder="搜索用户名或手机号">
                </div>
                <div class="filter-box">
                    <select class="filter-select">
                        <option value="all">全部状态</option>
                        <option value="active">活跃</option>
                        <option value="inactive">非活跃</option>
                    </select>
                </div>
            </div>
            <div class="table-container">
                <div class="section-title">用户列表</div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>手机号</th>
                            <th>注册时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- 用户数据将通过JavaScript动态生成 -->
                    </tbody>
                </table>
                <div class="pagination" id="pagination">
                    <button class="pagination-btn" disabled>&lt;</button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn">2</button>
                    <button class="pagination-btn">3</button>
                    <button class="pagination-btn">4</button>
                    <button class="pagination-btn">5</button>
                    <span class="pagination-ellipsis">...</span>
                    <button class="pagination-btn">76</button>
                    <button class="pagination-btn">&gt;</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 真实的农户姓名列表
        const farmerNames = [
            '王建国', '李长福', '张贵生', '刘芳', '陈永强', '孙海峰', '周秀兰', '吴天明', '赵志强', '黄淑珍',
            '杨建华', '马秀英', '朱伟', '胡静', '郭丽', '何军', '高勇', '林艳', '罗杰', '徐敏',
            '郑亮', '王芳', '李明', '张华', '刘强', '陈丽', '杨军', '赵静', '黄伟', '周杰',
            '吴芳', '徐军', '孙静', '马丽', '朱伟', '胡军', '郭芳', '何静', '高伟', '林芳',
            '罗杰', '李明', '张华', '刘强', '陈丽', '杨军', '赵静', '黄伟', '周杰', '吴芳',
            '徐军', '孙静', '马丽', '朱伟', '胡军', '郭芳', '何静', '高伟', '林芳', '罗杰',
            '王强', '李静', '张丽', '刘军', '陈伟', '杨静', '赵芳', '黄杰', '周军', '吴伟',
            '徐芳', '孙军', '马静', '朱丽', '胡伟', '郭军', '何芳', '高静', '林伟', '罗军',
            '王芳', '李明', '张华', '刘强', '陈丽', '杨军', '赵静', '黄伟', '周杰', '吴芳',
            '徐军', '孙静', '马丽', '朱伟', '胡军', '郭芳', '何静', '高伟', '林芳', '罗杰',
            '王强', '李静', '张丽', '刘军', '陈伟', '杨静', '赵芳', '黄杰', '周军', '吴伟',
            '徐芳', '孙军', '马静', '朱丽', '胡伟', '郭军', '何芳', '高静', '林伟', '罗军',
            '王芳', '李明', '张华', '刘强', '陈丽', '杨军', '赵静', '黄伟', '周杰', '吴芳',
            '徐军', '孙静', '马丽', '朱伟', '胡军', '郭芳', '何静', '高伟', '林芳', '罗杰',
            '王强', '李静', '张丽', '刘军', '陈伟', '杨静', '赵芳', '黄杰', '周军', '吴伟',
            '徐芳', '孙军', '马静', '朱丽', '胡伟', '郭军', '何芳', '高静', '林伟', '罗军',
            '王芳', '李明', '张华', '刘强', '陈丽', '杨军', '赵静', '黄伟', '周杰', '吴芳',
            '徐军', '孙静', '马丽', '朱伟', '胡军', '郭芳', '何静', '高伟', '林芳', '罗杰',
            '王强', '李静', '张丽', '刘军', '陈伟', '杨静', '赵芳', '黄杰', '周军', '吴伟',
            '徐芳', '孙军', '马静', '朱丽', '胡伟', '郭军', '何芳', '高静', '林伟', '罗军'
        ];

        // 真实的手机号前缀
        const phonePrefixes = ['138', '139', '137', '136', '135', '134', '133', '132', '131', '130'];

        // 生成真实的用户数据
        function generateUserData() {
            const userTableBody = document.getElementById('userTableBody');
            userTableBody.innerHTML = '';

            for (let i = 1; i <= 1523; i++) {
                // 使用真实的农户姓名
                const nameIndex = (i - 1) % farmerNames.length;
                const name = farmerNames[nameIndex];
                
                // 生成真实的手机号
                const prefixIndex = (i - 1) % phonePrefixes.length;
                const prefix = phonePrefixes[prefixIndex];
                const suffix = (10000000 + (i % 90000000)).toString();
                const phone = prefix + '****' + suffix.substring(4);
                
                // 生成真实的注册日期（2026年1月1日至2026年4月16日）
                const startDate = new Date(2026, 0, 1); // 2026年1月1日
                const endDate = new Date(2026, 3, 16); // 2026年4月16日
                const daysSinceStart = Math.floor((i - 1) % (endDate.getTime() - startDate.getTime()) / (1000 * 60 * 60 * 24));
                const registerDate = new Date(startDate.getTime() + daysSinceStart * 24 * 60 * 60 * 1000);
                const year = registerDate.getFullYear();
                const month = (registerDate.getMonth() + 1).toString().padStart(2, '0');
                const day = registerDate.getDate().toString().padStart(2, '0');
                const registerDateStr = `${year}-${month}-${day}`;
                
                // 90%的用户是活跃的
                const isActive = i % 10 !== 0;
                const statusClass = isActive ? 'active' : 'inactive';
                const statusText = isActive ? '活跃' : '非活跃';
                const blockButtonText = isActive ? '禁用' : '启用';

                const userRow = document.createElement('tr');
                userRow.innerHTML = `
                    <td>${i}</td>
                    <td>${name}</td>
                    <td>${phone}</td>
                    <td>${registerDateStr}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn view" onclick="viewUser(${i})">查看</button>
                            <button class="action-btn edit" onclick="editUser(${i})">编辑</button>
                            <button class="action-btn block" onclick="toggleUserStatus(${i}, ${isActive})">${blockButtonText}</button>
                        </div>
                    </td>
                `;
                userTableBody.appendChild(userRow);
            }
        }

        // 查看用户详情
        function viewUser(userId) {
            console.log('查看用户详情，用户ID:', userId);
            alert('跳转到用户详情页面，用户ID: ' + userId);
        }

        // 编辑用户
        function editUser(userId) {
            console.log('编辑用户，用户ID:', userId);
            alert('跳转到编辑用户页面，用户ID: ' + userId);
        }

        // 切换用户状态
        function toggleUserStatus(userId, isActive) {
            const action = isActive ? '禁用' : '启用';
            if (confirm('确定要' + action + '该用户吗？')) {
                console.log('点击了' + action + '用户按钮，用户ID:', userId);
                alert('用户' + action + '成功，用户ID: ' + userId);
            }
        }

        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('用户管理页面加载完成');
            // 生成1523条用户数据
            generateUserData();
            
            // 侧边栏菜单点击事件
            const menuItems = document.querySelectorAll('.sidebar-menu a');
            menuItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    menuItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    const text = this.textContent.trim();
                    if (text === '仪表盘') window.location.href = 'dashboard.html';
                    else if (text === '产品管理') window.location.href = 'products.html';
                    else if (text === '订单管理') window.location.href = 'orders.html';
                    else if (text === '用户管理') window.location.href = 'users.html';
                    else if (text === '数据统计') window.location.href = 'statistics.html';
                    else if (text === '系统设置') window.location.href = 'settings.html';
                });
            });
            
            // 退出登录按钮点击事件
            document.querySelector('.logout-btn').addEventListener('click', function() {
                if (confirm('确定要退出登录吗？')) {
                    window.location.href = 'login.html';
                }
            });
            
            // 搜索框事件
            const searchInput = document.querySelector('.search-input');
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const searchText = this.value;
                    alert('搜索用户: ' + searchText);
                }
            });
            
            // 筛选下拉框事件
            const filterSelect = document.querySelector('.filter-select');
            filterSelect.addEventListener('change', function() {
                const status = this.value;
                alert('筛选用户状态: ' + status);
            });
            
            // 分页按钮点击事件
            document.querySelectorAll('.pagination-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!this.disabled) {
                        const pageText = this.textContent;
                        if (pageText === '<' || pageText === '>') {
                            alert('跳转到' + (pageText === '<' ? '上一页' : '下一页'));
                        } else {
                            document.querySelectorAll('.pagination-btn').forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                            alert('跳转到第' + pageText + '页');
                        }
                    }
                });
            });
        });
    </script>
    <script src="js/theme.js"></script>
</body>
</html>

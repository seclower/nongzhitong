<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农智通 - 扫码访问</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00c68e, #00a872, #00c68e);
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            color: #00c68e;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 32px;
            animation: slideIn 0.8s ease;
        }

        .qrcode-wrapper {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px;
            display: inline-block;
            margin-bottom: 24px;
            box-shadow: var(--shadow-card);
            animation: slideIn 1s ease;
        }

        #qrcode {
            display: inline-block;
        }

        #qrcode canvas {
            border-radius: 12px;
        }

        .url-display {
            background: var(--bg-muted);
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            word-break: break-all;
            font-size: 14px;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            animation: slideIn 1.2s ease;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1.4s ease;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c68e 0%, #00a872 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(0, 198, 142, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 198, 142, 0.5);
        }

        .btn-secondary {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.5);
        }

        .tips {
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.8;
            animation: fadeIn 1.6s ease;
        }

        .tips p {
            margin: 4px 0;
        }

        .version {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌱 农智通</div>
        <div class="subtitle">农业智慧农业科技服务平台</div>
        
        <div class="qrcode-wrapper">
            <div id="qrcode"></div>
        </div>

        <div class="url-display" id="urlDisplay"></div>

        <div class="btn-group">
            <a href="/user/index.html" class="btn btn-primary">
                🏠 进入用户端
            </a>
            <a href="/admin/dashboard.html" class="btn btn-secondary">
                ⚙️ 进入管理后台
            </a>
        </div>

        <div class="tips">
            <p>📱 扫描上方二维码即可访问农智通</p>
            <p>🔗 或点击上方按钮直接进入</p>
        </div>

        <div class="version">v2.0 | 农智通科技农业平台</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        const hostname = window.location.hostname || '192.168.0.107';
        const port = window.location.port || '8081';
        const protocol = window.location.protocol || 'http:';
        const url = `${protocol}//${hostname}:${port}/user/index.html`;
        
        document.getElementById('urlDisplay').textContent = url;

        QRCode.toCanvas(url, {
            width: 240,
            margin: 2,
            color: {
                dark: '#1a1a2e',
                light: '#ffffff'
            }
        }, function(err, canvas) {
            if (err) {
                console.error(err);
                return;
            }
            document.getElementById('qrcode').appendChild(canvas);
        });
    </script>
</body>
</html>

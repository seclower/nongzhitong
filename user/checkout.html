<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农智通 - 结算</title>
    <link rel="stylesheet" href="styles/common.css">
</head>
<body>
    <div class="bg-base"></div>
    <div class="bg-gradient"></div>
    <div class="bg-metal-shine"></div>
    <div class="bg-grid"></div>
    <div class="light-streams"></div>
    <div class="light-diagonal"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="edge-glow"></div>

    <header class="header">
        <div class="header-title">确认订单</div>
    </header>

    <main class="main-content">
        <div class="checkout-address">
            <div class="address-icon">
                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="address-info">
                <div class="address-name">张三 138****8888</div>
                <div class="address-detail">北京市朝阳区某某街道某某小区1号楼101</div>
            </div>
        </div>

        <div class="checkout-items">
            <div class="checkout-item">
                <div class="checkout-img"><img src="images/农药1.png" alt="农药"></div>
                <div class="checkout-info">
                    <div class="checkout-name">三浦百灵6%春雷霉素</div>
                    <div class="checkout-price">¥6.00 x 1</div>
                </div>
            </div>
            <div class="checkout-item">
                <div class="checkout-img"><img src="images/农药2.png" alt="农药"></div>
                <div class="checkout-info">
                    <div class="checkout-name">高效氯氟氰菊酯</div>
                    <div class="checkout-price">¥12.00 x 2</div>
                </div>
            </div>
        </div>
    </main>

    <div class="checkout-footer">
        <div class="checkout-total">合计: <span>¥30.00</span></div>
        <div class="checkout-submit" onclick="submitOrder()">提交订单</div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item" onclick="navigateTo('index.html')">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="navigateTo('category.html')">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>分类</span>
        </div>
        <div class="nav-item active" onclick="navigateTo('cart.html')">
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span>购物车</span>
        </div>
        <div class="nav-item" onclick="navigateTo('calendar.html')">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/><circle cx="12" cy="16" r="2"/></svg>
            <span>农事日历</span>
        </div>
        <div class="nav-item" onclick="navigateTo('profile.html')">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的</span>
        </div>
    </nav>

    <script>
        function navigateTo(page) { window.location.href = page; }
        function submitOrder() { alert('订单提交成功'); }
    </script>
</body>
</html>

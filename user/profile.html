<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农智通 - 我的</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .login-section {
            text-align: center;
            padding: 40px 20px;
        }
        .login-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--bg-deep);
            padding: 16px 32px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 229, 160, 0.3);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 229, 160, 0.4);
        }
        .logout-btn {
            background: var(--bg-dark);
            color: var(--text-secondary);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        .logout-btn:hover {
            background: var(--bg-card);
            border-color: var(--border-active);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
        }
        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #00a896 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 229, 160, 0.2);
        }
        .user-avatar svg {
            width: 32px;
            height: 32px;
            stroke: #000;
            fill: none;
            stroke-width: 1.5;
        }
        .user-details h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .user-details p {
            margin: 4px 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    <div class="bg-gradient"></div>
    <div class="bg-metal-shine"></div>
    <div class="bg-grid"></div>
    <div class="light-streams"></div>
    <div class="light-diagonal"></div>
    <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
    <div class="edge-glow"></div>
    <header class="header"><div class="header-title">个人中心</div></header>
    <main class="main-content">
        <div id="userSection"></div>
        
        <div class="quick-grid" id="quickGrid" style="display: none;">
            <div class="quick-item" onclick="navigateTo('order.html')">
                <div class="quick-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                <span>我的订单</span>
            </div>
            <div class="quick-item" onclick="navigateTo('addresses.html')">
                <div class="quick-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
                <span>地址管理</span>
            </div>
            <div class="quick-item" onclick="navigateTo('coupons.html')">
                <div class="quick-icon"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>
                <span>优惠券</span>
            </div>
            <div class="quick-item" onclick="navigateTo('points.html')">
                <div class="quick-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                <span>积分商城</span>
            </div>
        </div>

        <div class="menu-card" id="menuCard" style="display: none;">
            <div class="menu-list">
                <div class="menu-row" onclick="navigateTo('favorites.html')">
                    <div class="menu-left">
                        <div class="menu-icon-sm"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
                        <span>我的收藏</span>
                    </div>
                    <div class="menu-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
                <div class="menu-row" onclick="navigateTo('help.html')">
                    <div class="menu-left">
                        <div class="menu-icon-sm"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                        <span>帮助与反馈</span>
                    </div>
                    <div class="menu-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
                <div class="menu-row" onclick="navigateTo('settings.html')">
                    <div class="menu-left">
                        <div class="menu-icon-sm"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
                        <span>设置</span>
                    </div>
                    <div class="menu-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
            </div>
        </div>
    </main>
    <nav class="footer-nav">
        <div class="nav-item" onclick="navigateTo('index.html')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>首页</span></div>
        <div class="nav-item" onclick="navigateTo('category.html')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>分类</span></div>
        <div class="nav-item" onclick="navigateTo('cart.html')"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>购物车</span></div>
        <div class="nav-item" onclick="navigateTo('calendar.html')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>农事日历</span></div>
        <div class="nav-item active" onclick="navigateTo('profile.html')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
    </nav>
    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
        
        function checkLogin() {
            const user = localStorage.getItem('user');
            const userSection = document.getElementById('userSection');
            const quickGrid = document.getElementById('quickGrid');
            const menuCard = document.getElementById('menuCard');
            
            if (user) {
                const userData = JSON.parse(user);
                userSection.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">
                            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="user-details">
                            <h3>${userData.name || userData.username}</h3>
                            <p>${userData.phone || '未绑定手机号'}</p>
                        </div>
                    </div>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                `;
                quickGrid.style.display = 'grid';
                menuCard.style.display = 'block';
            } else {
                userSection.innerHTML = `
                    <div class="login-section">
                        <div class="profile-avatar-lg" style="margin: 0 auto 24px;">
                            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <h2 style="margin-bottom: 16px; color: var(--text-primary);">欢迎使用农智通</h2>
                        <p style="margin-bottom: 32px; color: var(--text-muted);">登录后查看个人信息和订单</p>
                        <button class="login-btn" onclick="navigateTo('login.html')">立即登录</button>
                    </div>
                `;
                quickGrid.style.display = 'none';
                menuCard.style.display = 'none';
            }
        }
        
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                checkLogin();
            }
        }
        
        // 页面加载时检查登录状态
        checkLogin();
    </script>
    <script src="js/theme.js"></script>
</body>
</html>

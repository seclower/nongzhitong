<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农智通 - 产品详情</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .product-detail-container {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow-card);
        }
        .product-detail-img {
            width: 100%;
            height: 300px;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-detail-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-detail-info {
            padding: 20px;
        }
        .product-detail-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .product-detail-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 8px;
        }
        .product-detail-price .original {
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: line-through;
            margin-left: 8px;
            font-weight: 400;
        }
        .product-detail-sales {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .product-detail-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .product-tag {
            padding: 4px 12px;
            background: var(--primary-subtle);
            color: var(--primary);
            border-radius: var(--radius-sm);
            font-size: 12px;
        }
        .seckill-tag {
            background: rgba(255, 82, 82, 0.1);
            color: var(--danger);
        }
        .groupon-tag {
            background: rgba(33, 150, 243, 0.1);
            color: var(--info);
        }
        .product-detail-desc {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 100px;
            box-shadow: var(--shadow-card);
        }
        .desc-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .desc-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .product-action-bar {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            background: var(--bg-card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        .action-icons {
            display: flex;
            gap: 16px;
        }
        .action-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .action-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 1.5;
            transition: all 0.3s ease;
        }
        .action-icon span {
            font-size: 10px;
            color: var(--text-muted);
        }
        .action-icon:hover svg {
            stroke: var(--primary);
        }
        .action-icon.active svg {
            fill: var(--danger);
            stroke: var(--danger);
        }
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-add-cart {
            padding: 12px 20px;
            background: var(--primary);
            color: var(--bg-deep);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-add-cart:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-buy-now {
            padding: 12px 20px;
            background: var(--danger);
            color: var(--text-on-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-buy-now:hover {
            background: var(--danger);
            transform: translateY(-2px);
        }
        .seckill-countdown-box {
            background: linear-gradient(135deg, var(--danger), var(--danger-light));
            color: var(--text-on-primary);
            padding: 16px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            text-align: center;
        }
        .seckill-countdown-title {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.9;
        }
        .seckill-countdown-time {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .countdown-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-weight: 700;
            min-width: 40px;
        }
        .countdown-sep {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
        }
        .groupon-users {
            display: flex;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
        }
        .groupon-user {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-deep);
            font-size: 14px;
            font-weight: 600;
            margin-right: -10px;
            border: 2px solid var(--bg-card);
        }
        .groupon-users-text {
            margin-left: 50px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 40px;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
        }
        .quantity-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .quantity-control {
            display: flex;
            align-items: center;
        }
        .quantity-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quantity-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .quantity-input {
            width: 50px;
            height: 32px;
            border: 1px solid var(--border-color);
            border-left: none;
            border-right: none;
            text-align: center;
            font-size: 14px;
            background: var(--bg-card);
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 16px 32px;
            border-radius: var(--radius-md);
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    <div class="bg-gradient"></div>
    <div class="bg-metal-shine"></div>
    <div class="bg-grid"></div>
    <div class="light-streams"></div>
    <div class="light-diagonal"></div>
    <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
    <div class="edge-glow"></div>
    <header class="header">
        <div class="header-left" onclick="goBack()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="header-title" id="headerTitle">产品详情</div>
        <div class="header-right"></div>
    </header>
    <main class="main-content" id="mainContent">
        <!-- 内容将通过JavaScript动态填充 -->
    </main>
    <div class="toast" id="toast"></div>
    <nav class="footer-nav">
        <div class="nav-item" onclick="navigateTo('index.html')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>首页</span></div>
        <div class="nav-item" onclick="navigateTo('category.html')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>分类</span></div>
        <div class="nav-item" onclick="navigateTo('cart.html')"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>购物车</span></div>
        <div class="nav-item" onclick="navigateTo('calendar.html')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>农事日历</span></div>
        <div class="nav-item" onclick="navigateTo('profile.html')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
    </nav>
    <script>
        function navigateTo(page) { window.location.href = page; }
        
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        let quantity = 1;
        let currentProduct = null;
        let isFavorite = false;
        
        function updateQuantity(delta) {
            quantity = Math.max(1, Math.min(99, quantity + delta));
            document.getElementById('quantityInput').value = quantity;
        }
        
        function toggleFavorite() {
            isFavorite = !isFavorite;
            const icon = document.querySelector('.action-icon:first-child');
            if (isFavorite) {
                icon.classList.add('active');
                showToast('已添加至收藏');
            } else {
                icon.classList.remove('active');
                showToast('已取消收藏');
            }
        }
        
        function addToCart() {
            const user = localStorage.getItem('user');
            if (!user) {
                if (confirm('请先登录，是否跳转到登录页面？')) {
                    navigateTo('login.html');
                }
                return;
            }
            
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existingIndex = cart.findIndex(item => item.name === currentProduct.name);
            
            if (existingIndex > -1) {
                cart[existingIndex].quantity += quantity;
            } else {
                cart.push({
                    ...currentProduct,
                    quantity: quantity
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            showToast('已加入购物车');
        }
        
        function buyNow() {
            const user = localStorage.getItem('user');
            if (!user) {
                if (confirm('请先登录，是否跳转到登录页面？')) {
                    navigateTo('login.html');
                }
                return;
            }
            
            showToast('正在跳转结算...');
            setTimeout(() => {
                navigateTo('checkout.html');
            }, 1000);
        }
        
        function initProductDetail() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name') || '三浦百灵6%春雷霉素';
            const price = params.get('price') || '6.00';
            const originalPrice = params.get('originalPrice') || '8.00';
            const image = params.get('image') || 'images/农药1.png';
            const sales = params.get('sales') || '50';
            const desc = params.get('desc') || '三浦百灵6%春雷霉素番茄叶霉黄瓜角斑病溃疡青枯软腐病杀菌剂农药';
            const type = params.get('type') || '';
            
            currentProduct = { name, price: parseFloat(price), originalPrice: parseFloat(originalPrice), image, sales: parseInt(sales), desc };
            
            document.getElementById('headerTitle').textContent = type === 'seckill' ? '秒杀商品详情' : type === 'groupon' ? '拼团商品详情' : '产品详情';
            
            let specialContent = '';
            if (type === 'seckill') {
                specialContent = `
                    <div class="seckill-countdown-box">
                        <div class="seckill-countdown-title">距离秒杀结束</div>
                        <div class="seckill-countdown-time">
                            <div class="countdown-box" id="hours">02</div>
                            <div class="countdown-sep">:</div>
                            <div class="countdown-box" id="minutes">35</div>
                            <div class="countdown-sep">:</div>
                            <div class="countdown-box" id="seconds">48</div>
                        </div>
                    </div>
                `;
            } else if (type === 'groupon') {
                specialContent = `
                    <div class="groupon-users">
                        <div class="groupon-user">张</div>
                        <div class="groupon-user">李</div>
                        <div class="groupon-users-text">等2人正在拼团，点击参与</div>
                    </div>
                `;
            }
            
            document.getElementById('mainContent').innerHTML = `
                <div class="product-detail-container">
                    <div class="product-detail-img">
                        <img src="${image}" alt="${name}">
                    </div>
                    <div class="product-detail-info">
                        <div class="product-detail-name">${name}</div>
                        <div class="product-detail-price">¥${price} <span class="original">¥${originalPrice}</span></div>
                        <div class="product-detail-sales">已售${sales}件</div>
                        <div class="product-detail-tags">
                            <span class="product-tag">正品保证</span>
                            <span class="product-tag">急速发货</span>
                            ${type === 'seckill' ? '<span class="product-tag seckill-tag">限时特惠</span>' : ''}
                            ${type === 'groupon' ? '<span class="product-tag groupon-tag">拼团优惠</span>' : ''}
                        </div>
                        ${specialContent}
                        <div class="quantity-selector">
                            <span class="quantity-label">购买数量</span>
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="updateQuantity(-1)">-</button>
                                <input type="text" class="quantity-input" id="quantityInput" value="1" readonly>
                                <button class="quantity-btn" onclick="updateQuantity(1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="product-detail-desc">
                    <div class="desc-title">商品描述</div>
                    <div class="desc-content">${desc}</div>
                </div>
            `;
            
            if (type === 'seckill') {
                startSeckillCountdown();
            }
        }
        
        function startSeckillCountdown() {
            let hours = 2, minutes = 35, seconds = 48;
            
            setInterval(() => {
                seconds--;
                if (seconds < 0) {
                    seconds = 59;
                    minutes--;
                    if (minutes < 0) {
                        minutes = 59;
                        hours--;
                        if (hours < 0) {
                            hours = 23;
                        }
                    }
                }
                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }, 1000);
        }
        
        initProductDetail();
    </script>
    <script src="js/theme.js"></script>
</body>
</html>

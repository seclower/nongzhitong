<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农智通 - 我的优惠券</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .coupon-tabs {
            display: flex;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-card);
        }
        .coupon-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .coupon-tab.active {
            background: var(--primary);
            color: var(--bg-deep);
            font-weight: 600;
        }
        .coupon-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .coupon-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            position: relative;
        }
        .coupon-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        .coupon-content {
            display: flex;
            padding: 20px;
            position: relative;
        }
        .coupon-content::before {
            content: '';
            position: absolute;
            left: 120px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--border-subtle);
        }
        .coupon-value {
            width: 120px;
            text-align: center;
            margin-right: 20px;
        }
        .coupon-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .coupon-condition {
            font-size: 12px;
            color: var(--text-muted);
        }
        .coupon-info {
            flex: 1;
        }
        .coupon-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .coupon-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .coupon-time {
            font-size: 12px;
            color: var(--text-muted);
        }
        .coupon-status {
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg) translate(20px, -20px);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0.8;
        }
        .coupon-card.disabled .coupon-amount {
            color: var(--text-muted);
        }
        .coupon-card.disabled .coupon-content {
            opacity: 0.6;
        }
        .empty-coupon {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-coupon-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-coupon-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .empty-coupon-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .empty-coupon-btn {
            padding: 12px 24px;
            background: var(--primary);
            color: var(--bg-deep);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .empty-coupon-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .coupon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .coupon-header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .coupon-count {
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    <div class="bg-gradient"></div>
    <div class="bg-metal-shine"></div>
    <div class="bg-grid"></div>
    <div class="light-streams"></div>
    <div class="light-diagonal"></div>
    <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
    <div class="edge-glow"></div>
    <header class="header">
        <div class="header-left" onclick="navigateTo('profile.html')">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="header-title">我的优惠券</div>
        <div class="header-right"></div>
    </header>
    <main class="main-content">
        <div class="coupon-tabs">
            <div class="coupon-tab active" data-status="available">可使用</div>
            <div class="coupon-tab" data-status="used">已使用</div>
            <div class="coupon-tab" data-status="expired">已过期</div>
        </div>
        
        <div class="coupon-list" id="couponList">
            <!-- 优惠券1 -->
            <div class="coupon-card" data-status="available">
                <div class="coupon-content">
                    <div class="coupon-value">
                        <div class="coupon-amount">¥50</div>
                        <div class="coupon-condition">满200可用</div>
                    </div>
                    <div class="coupon-info">
                        <div class="coupon-title">新用户专享优惠券</div>
                        <div class="coupon-desc">适用于所有商品，不限品类</div>
                        <div class="coupon-time">有效期：2026.04.01 - 2026.05.01</div>
                    </div>
                </div>
            </div>
            
            <!-- 优惠券2 -->
            <div class="coupon-card" data-status="available">
                <div class="coupon-content">
                    <div class="coupon-value">
                        <div class="coupon-amount">¥30</div>
                        <div class="coupon-condition">满150可用</div>
                    </div>
                    <div class="coupon-info">
                        <div class="coupon-title">化肥专享优惠券</div>
                        <div class="coupon-desc">适用于化肥品类商品</div>
                        <div class="coupon-time">有效期：2026.04.01 - 2026.04.30</div>
                    </div>
                </div>
            </div>
            
            <!-- 优惠券3 -->
            <div class="coupon-card" data-status="used">
                <div class="coupon-content">
                    <div class="coupon-value">
                        <div class="coupon-amount">¥20</div>
                        <div class="coupon-condition">满100可用</div>
                    </div>
                    <div class="coupon-info">
                        <div class="coupon-title">通用优惠券</div>
                        <div class="coupon-desc">适用于所有商品</div>
                        <div class="coupon-time">有效期：2026.03.01 - 2026.03.31</div>
                    </div>
                </div>
                <div class="coupon-status">已使用</div>
            </div>
            
            <!-- 优惠券4 -->
            <div class="coupon-card disabled" data-status="expired">
                <div class="coupon-content">
                    <div class="coupon-value">
                        <div class="coupon-amount">¥10</div>
                        <div class="coupon-condition">满50可用</div>
                    </div>
                    <div class="coupon-info">
                        <div class="coupon-title">首单优惠券</div>
                        <div class="coupon-desc">适用于首次购买</div>
                        <div class="coupon-time">有效期：2026.02.01 - 2026.02.29</div>
                    </div>
                </div>
                <div class="coupon-status">已过期</div>
            </div>
        </div>
    </main>
    <nav class="footer-nav">
        <div class="nav-item" onclick="navigateTo('index.html')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></div>
        <div class="nav-item" onclick="navigateTo('category.html')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>分类</span></div>
        <div class="nav-item" onclick="navigateTo('cart.html')"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>购物车</span></div>
        <div class="nav-item" onclick="navigateTo('calendar.html')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>农事日历</span></div>
        <div class="nav-item active" onclick="navigateTo('profile.html')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
    </nav>
    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
        
        // 优惠券状态切换
        document.querySelectorAll('.coupon-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // 移除所有标签的活动状态
                document.querySelectorAll('.coupon-tab').forEach(t => t.classList.remove('active'));
                // 添加当前标签的活动状态
                this.classList.add('active');
                
                const status = this.dataset.status;
                const couponCards = document.querySelectorAll('.coupon-card');
                const couponList = document.getElementById('couponList');
                
                let visibleCount = 0;
                couponCards.forEach(card => {
                    if (card.dataset.status === status) {
                        card.style.display = 'block';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                // 显示空状态
                if (visibleCount === 0) {
                    let emptyTitle = '';
                    let emptyDesc = '';
                    
                    switch(status) {
                        case 'available':
                            emptyTitle = '暂无可用优惠券';
                            emptyDesc = '去购物页面看看有什么优惠活动';
                            break;
                        case 'used':
                            emptyTitle = '暂无已使用优惠券';
                            emptyDesc = '您还没有使用过优惠券';
                            break;
                        case 'expired':
                            emptyTitle = '暂无过期优惠券';
                            emptyDesc = '您的优惠券都在有效期内';
                            break;
                    }
                    
                    couponList.innerHTML = `
                        <div class="empty-coupon">
                            <div class="empty-coupon-icon">🎫</div>
                            <div class="empty-coupon-title">${emptyTitle}</div>
                            <div class="empty-coupon-desc">${emptyDesc}</div>
                            ${status === 'available' ? '<button class="empty-coupon-btn" onclick="navigateTo(\'index.html\')">去购物</button>' : ''}
                        </div>
                    `;
                }
            });
        });
        
        // 优惠券点击事件
        document.querySelectorAll('.coupon-card[data-status="available"]').forEach(card => {
            card.addEventListener('click', function() {
                alert('优惠券已添加到购物车');
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农智通 - 地址管理</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .address-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 80px;
        }
        .address-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            position: relative;
        }
        .address-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        .address-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .address-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .address-phone {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 16px;
        }
        .address-default {
            background: var(--primary-subtle);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
        }
        .address-detail {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .address-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .address-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-elevated);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .address-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .add-address-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 229, 160, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .add-address-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 229, 160, 0.5);
        }
        .add-address-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--bg-deep);
            fill: none;
            stroke-width: 1.5;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .modal-close {
            cursor: pointer;
            padding: 4px;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
        }
        .modal-close:hover {
            background: var(--bg-elevated);
        }
        .modal-close svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 1.5;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--bg-elevated);
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 229, 160, 0.2);
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }
        .form-checkbox label {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }
        .form-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .form-btn.cancel {
            background: var(--bg-elevated);
            color: var(--text-secondary);
        }
        .form-btn.cancel:hover {
            border-color: var(--border-active);
        }
        .form-btn.submit {
            background: var(--primary);
            color: var(--bg-deep);
            border-color: var(--primary);
        }
        .form-btn.submit:hover {
            background: var(--primary-dark);
        }
        .empty-address {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-address-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-address-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .empty-address-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .empty-address-btn {
            padding: 12px 24px;
            background: var(--primary);
            color: var(--bg-deep);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .empty-address-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    <div class="bg-gradient"></div>
    <div class="bg-metal-shine"></div>
    <div class="bg-grid"></div>
    <div class="light-streams"></div>
    <div class="light-diagonal"></div>
    <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
    <div class="edge-glow"></div>
    <header class="header">
        <div class="header-left" onclick="navigateTo('profile.html')">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="header-title">地址管理</div>
        <div class="header-right"></div>
    </header>
    <main class="main-content">
        <div class="address-list" id="addressList">
            <!-- 地址1 -->
            <div class="address-card">
                <div class="address-header">
                    <div>
                        <span class="address-name">张三</span>
                        <span class="address-phone">138****8888</span>
                    </div>
                    <div class="address-default">默认</div>
                </div>
                <div class="address-detail">
                    北京市朝阳区建国路88号SOHO现代城5号楼2001室
                </div>
                <div class="address-actions">
                    <button class="address-btn" onclick="editAddress(0)">编辑</button>
                    <button class="address-btn" onclick="deleteAddress(0)">删除</button>
                </div>
            </div>
            
            <!-- 地址2 -->
            <div class="address-card">
                <div class="address-header">
                    <div>
                        <span class="address-name">李四</span>
                        <span class="address-phone">139****9999</span>
                    </div>
                </div>
                <div class="address-detail">
                    上海市浦东新区张江高科技园区博云路2号
                </div>
                <div class="address-actions">
                    <button class="address-btn" onclick="setDefault(1)">设为默认</button>
                    <button class="address-btn" onclick="editAddress(1)">编辑</button>
                    <button class="address-btn" onclick="deleteAddress(1)">删除</button>
                </div>
            </div>
            
            <!-- 地址3 -->
            <div class="address-card">
                <div class="address-header">
                    <div>
                        <span class="address-name">王五</span>
                        <span class="address-phone">137****7777</span>
                    </div>
                </div>
                <div class="address-detail">
                    广州市天河区珠江新城冼村路28号
                </div>
                <div class="address-actions">
                    <button class="address-btn" onclick="setDefault(2)">设为默认</button>
                    <button class="address-btn" onclick="editAddress(2)">编辑</button>
                    <button class="address-btn" onclick="deleteAddress(2)">删除</button>
                </div>
            </div>
        </div>
        
        <!-- 添加地址按钮 -->
        <div class="add-address-btn" onclick="showAddModal()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
    </main>
    
    <!-- 添加/编辑地址模态框 -->
    <div class="modal" id="addressModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">添加地址</div>
                <div class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </div>
            </div>
            <form id="addressForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">收货人</label>
                        <input type="text" class="form-input" id="name" placeholder="请输入收货人姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">省/市/区</label>
                    <input type="text" class="form-input" id="region" placeholder="请输入省/市/区">
                </div>
                <div class="form-group">
                    <label class="form-label">详细地址</label>
                    <input type="text" class="form-input" id="detail" placeholder="请输入详细地址">
                </div>
                <div class="form-group">
                    <div class="form-checkbox">
                        <input type="checkbox" id="default" value="1">
                        <label for="default">设为默认地址</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="form-btn cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="form-btn submit">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <nav class="footer-nav">
        <div class="nav-item" onclick="navigateTo('index.html')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></div>
        <div class="nav-item" onclick="navigateTo('category.html')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>分类</span></div>
        <div class="nav-item" onclick="navigateTo('cart.html')"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>购物车</span></div>
        <div class="nav-item" onclick="navigateTo('calendar.html')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>农事日历</span></div>
        <div class="nav-item active" onclick="navigateTo('profile.html')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
    </nav>
    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
        
        // 地址数据
        let addresses = [
            {
                id: 1,
                name: '张三',
                phone: '138****8888',
                region: '北京市朝阳区',
                detail: '建国路88号SOHO现代城5号楼2001室',
                isDefault: true
            },
            {
                id: 2,
                name: '李四',
                phone: '139****9999',
                region: '上海市浦东新区',
                detail: '张江高科技园区博云路2号',
                isDefault: false
            },
            {
                id: 3,
                name: '王五',
                phone: '137****7777',
                region: '广州市天河区',
                detail: '珠江新城冼村路28号',
                isDefault: false
            }
        ];
        
        let currentEditIndex = -1;
        
        // 显示添加地址模态框
        function showAddModal() {
            currentEditIndex = -1;
            document.getElementById('modalTitle').textContent = '添加地址';
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('region').value = '';
            document.getElementById('detail').value = '';
            document.getElementById('default').checked = false;
            document.getElementById('addressModal').style.display = 'flex';
        }
        
        // 显示编辑地址模态框
        function editAddress(index) {
            currentEditIndex = index;
            const address = addresses[index];
            document.getElementById('modalTitle').textContent = '编辑地址';
            document.getElementById('name').value = address.name;
            document.getElementById('phone').value = address.phone;
            document.getElementById('region').value = address.region;
            document.getElementById('detail').value = address.detail;
            document.getElementById('default').checked = address.isDefault;
            document.getElementById('addressModal').style.display = 'flex';
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('addressModal').style.display = 'none';
        }
        
        // 删除地址
        function deleteAddress(index) {
            if (confirm('确定要删除这个地址吗？')) {
                addresses.splice(index, 1);
                renderAddresses();
            }
        }
        
        // 设置默认地址
        function setDefault(index) {
            addresses.forEach((addr, i) => {
                addr.isDefault = (i === index);
            });
            renderAddresses();
        }
        
        // 渲染地址列表
        function renderAddresses() {
            const addressList = document.getElementById('addressList');
            if (addresses.length === 0) {
                addressList.innerHTML = `
                    <div class="empty-address">
                        <div class="empty-address-icon">📍</div>
                        <div class="empty-address-title">暂无地址</div>
                        <div class="empty-address-desc">添加收货地址，方便购物</div>
                        <button class="empty-address-btn" onclick="showAddModal()">添加地址</button>
                    </div>
                `;
                return;
            }
            
            addressList.innerHTML = addresses.map((address, index) => `
                <div class="address-card">
                    <div class="address-header">
                        <div>
                            <span class="address-name">${address.name}</span>
                            <span class="address-phone">${address.phone}</span>
                        </div>
                        ${address.isDefault ? '<div class="address-default">默认</div>' : ''}
                    </div>
                    <div class="address-detail">
                        ${address.region} ${address.detail}
                    </div>
                    <div class="address-actions">
                        ${!address.isDefault ? `<button class="address-btn" onclick="setDefault(${index})")">设为默认</button>` : ''}
                        <button class="address-btn" onclick="editAddress(${index})")">编辑</button>
                        <button class="address-btn" onclick="deleteAddress(${index})")">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 表单提交
        document.getElementById('addressForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const region = document.getElementById('region').value;
            const detail = document.getElementById('detail').value;
            const isDefault = document.getElementById('default').checked;
            
            if (!name || !phone || !region || !detail) {
                alert('请填写完整地址信息');
                return;
            }
            
            if (currentEditIndex === -1) {
                // 添加新地址
                const newAddress = {
                    id: addresses.length + 1,
                    name,
                    phone,
                    region,
                    detail,
                    isDefault
                };
                if (isDefault) {
                    addresses.forEach(addr => addr.isDefault = false);
                }
                addresses.push(newAddress);
            } else {
                // 编辑现有地址
                if (isDefault) {
                    addresses.forEach(addr => addr.isDefault = false);
                }
                addresses[currentEditIndex] = {
                    ...addresses[currentEditIndex],
                    name,
                    phone,
                    region,
                    detail,
                    isDefault
                };
            }
            
            renderAddresses();
            closeModal();
        });
        
        // 点击模态框外部关闭
        document.getElementById('addressModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // 页面加载时渲染地址列表
        renderAddresses();
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
